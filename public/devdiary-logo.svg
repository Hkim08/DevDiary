<svg width="320" height="64" viewBox="0 0 320 64" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>DevDiary.uk logo</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
    </style>
  </defs>

  <!-- Icon mark: stylised open notebook with a terminal cursor -->
  <rect x="0" y="0" width="64" height="64" rx="12" fill="#0F2744"/>

  <!-- Notebook pages left side -->
  <rect x="12" y="14" width="18" height="36" rx="2" fill="#1C2B3A"/>
  <!-- Notebook pages right side -->
  <rect x="34" y="14" width="18" height="36" rx="2" fill="#1A6BDB"/>

  <!-- Spine line -->
  <rect x="30" y="14" width="4" height="36" fill="#0F2744"/>

  <!-- Left page lines (muted) -->
  <rect x="15" y="22" width="12" height="2" rx="1" fill="#2D4060"/>
  <rect x="15" y="27" width="9" height="2" rx="1" fill="#2D4060"/>
  <rect x="15" y="32" width="11" height="2" rx="1" fill="#2D4060"/>
  <rect x="15" y="37" width="7" height="2" rx="1" fill="#2D4060"/>

  <!-- Right page: terminal prompt -->
  <rect x="37" y="22" width="6" height="2" rx="1" fill="#7BB8F4"/>
  <!-- cursor blink block -->
  <rect x="44" y="22" width="5" height="8" rx="1" fill="#1A6BDB"/>
  <!-- second line of code -->
  <rect x="37" y="30" width="11" height="2" rx="1" fill="#7BB8F4" opacity="0.6"/>
  <rect x="37" y="35" width="8" height="2" rx="1" fill="#7BB8F4" opacity="0.4"/>

  <!-- Wordmark -->
  <!-- "Dev" in light text -->
  <text x="80" y="40" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="600" letter-spacing="-0.5" fill="#F0F3F8">Dev</text>
  <!-- "Diary" in accent blue -->
  <text x="131" y="40" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="600" letter-spacing="-0.5" fill="#1A6BDB">Diary</text>
  <!-- ".uk" in sky blue, smaller -->
  <text x="222" y="40" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400" fill="#7BB8F4">.uk</text>

  <!-- Tagline -->
  <text x="81" y="54" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#5A6070" letter-spacing="0.04em">BUILD · SHIP · DOCUMENT</text>
</svg>
