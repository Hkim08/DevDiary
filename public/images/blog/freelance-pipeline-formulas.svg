  <line x1="150" y1="68" x2="150" y2="340" class="gridline" />
  <line x1="221.7" y1="68" x2="221.7" y2="340" class="gridline" />
  <line x1="293.3" y1="68" x2="293.3" y2="340" class="gridline" />
  <line x1="365" y1="68" x2="365" y2="340" class="gridline" />
