    .bar-label { fill: #cbd5e1; font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 500; }
    .bar-value { fill: #f1f5f9; font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 600; }
    .axis-label { fill: #64748b; font-family: system-ui, -apple-system, sans-serif; font-size: 10px; }
    .gridline { stroke: #334155; stroke-width: 1; stroke-dasharray: 3,3; }
    .source { fill: #475569; font-family: system-ui, -apple-system, sans-serif; font-size: 9px; }
    .bar-fs { fill: #14b8a6; } /* teal-500 */
    .bar-db { fill: #06b6d4; } /* cyan-500 */
    .bar-pl { fill: #0ea5e9; } /* sky-500 */
    .bar-it { fill: #3b82f6; } /* blue-500 */
    .bar-st { fill: #6366f1; } /* indigo-500 */
    .bar-ht { fill: #6b7280; } /* gray-500 */
    .total-highlight { fill: #fbbf24; font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; }
  </style>

  <!-- Background -->
