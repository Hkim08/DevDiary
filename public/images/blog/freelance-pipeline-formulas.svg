<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 380" role="img" aria-label="Horizontal bar chart showing formula count per tab in the Freelance Pipeline &amp; Follow-Up Tracker: Follow-Up Scheduler 55 formulas, Dashboard 47, Pipeline 42, Invoice Tracker 38, Settings 23, How To Use 0 (documentation only).">
  <title>Formulas per Tab — Freelance Pipeline Tracker (June 2026)</title>
  <desc>Horizontal bar chart of 291 total formulas distributed across 6 tabs. Follow-Up Scheduler leads with 55 formulas for cadence logic and next-date auto-calculation. Dashboard follows with 47 formulas using SUMPRODUCT, COUNTIFS, and ARRAYFORMULA for weighted pipeline value. Pipeline has 42 formulas for conditional formatting and stage validation. Invoice Tracker has 38 formulas for days-overdue calculation and escalation colors. Settings has 23 formulas for named ranges and probability tables. How To Use has 0 formulas as it is documentation only.</desc>

  <style>
    .title { fill: #f1f5f9; font-family: system-ui, -apple-system, sans-serif; font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
