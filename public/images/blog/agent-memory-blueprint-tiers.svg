<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 330" width="700" height="330" role="img" aria-label="4-Tier Context Architecture Token Budget Range Chart: Tier 1 Minimal 500–1,200 tokens, Tier 2 Standard 1,500–3,000 tokens, Tier 3 Full Memory 3,000–5,500 tokens, Tier 4 Multi-Agent orchestrator 2,000–4,000 tokens, specialists 1,500–2,500 tokens">
  <title>4-Tier Context Architecture — Token Budget Range (2026)</title>
  <desc>Horizontal range bar chart comparing token budget ranges across the four tiers of the Agent Memory Blueprint context architecture. Tier 1 Minimal spans 500-1,200 tokens for demos and prototypes under 10 turns. Tier 2 Standard spans 1,500-3,000 tokens for production single-agent tasks with auto-compression. Tier 3 Full Memory spans 3,000-5,500 tokens for named persona assistants with cross-session episodic memory. Tier 4 Multi-Agent allocates 2,000-4,000 tokens for the orchestrator and 1,500-2,500 tokens for each specialist in the agent team. Source: context-schemas.json reference implementation.</desc>

  <style>
    .chart-title { fill: #F0F3F8; font-family: Inter, system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
    .tier-label { fill: #F0F3F8; font-family: Inter, system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 500; }
    .value-label { fill: #9099A8; font-family: Inter, system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 400; }
    .axis-label { fill: #5A6070; font-family: Inter, system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; }
    .source { fill: #5A6070; font-family: Inter, system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; }
    .annot-label { fill: #7BB8F4; font-family: Inter, system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 500; }
    .bar-orchestrator { fill: #1A6BDB; opacity: 0.85; }
    .bar-specialist { fill: #7BB8F4; opacity: 0.45; }
    .bar-baseline { stroke: #1C2B3A; stroke-width: 1; }
    .gridline { stroke: #1C2B3A; stroke-width: 1; stroke-dasharray: 3,3; }
  </style>

  <!-- Title -->
  <text x="345" y="24" class="chart-title" text-anchor="middle">4-Tier Architecture — Token Budget Range (2026)</text>

  <!-- Vertical gridlines at each 1K token mark -->
  <line x1="170.0" y1="44" x2="170.0" y2="272" class="gridline" />
  <line x1="247.5" y1="44" x2="247.5" y2="272" class="gridline" />
  <line x1="325.0" y1="44" x2="325.0" y2="272" class="gridline" />
  <line x1="402.5" y1="44" x2="402.5" y2="272" class="gridline" />
  <line x1="480.0" y1="44" x2="480.0" y2="272" class="gridline" />
  <line x1="557.5" y1="44" x2="557.5" y2="272" class="gridline" />
  <line x1="635.0" y1="44" x2="635.0" y2="272" class="gridline" />

  <!-- X-axis labels -->
  <text x="170.0" y="288" class="axis-label" text-anchor="middle">0</text>
  <text x="247.5" y="288" class="axis-label" text-anchor="middle">1K</text>
  <text x="325.0" y="288" class="axis-label" text-anchor="middle">2K</text>
  <text x="402.5" y="288" class="axis-label" text-anchor="middle">3K</text>
  <text x="480.0" y="288" class="axis-label" text-anchor="middle">4K</text>
  <text x="557.5" y="288" class="axis-label" text-anchor="middle">5K</text>
  <text x="635.0" y="288" class="axis-label" text-anchor="middle">6K</text>

  <!-- ==================== TIER 1 — Minimal (500–1,200) ==================== -->
  <!-- Baseline from 0 to bar minimum -->
  <line x1="170.0" y1="70" x2="208.75" y2="70" class="bar-baseline" />
  <!-- Range bar -->
  <rect x="208.75" y="59" width="54.25" height="22" rx="4" class="bar-orchestrator" />
  <!-- Tier label -->
  <text x="160" y="74" class="tier-label" text-anchor="end">Tier 1 — Minimal</text>
  <!-- Min / max value labels -->
  <text x="203.75" y="74" class="value-label" text-anchor="end">500</text>
  <text x="268.00" y="74" class="value-label" text-anchor="start">1.2K</text>

  <!-- ==================== TIER 2 — Standard (1,500–3,000) ==================== -->
  <line x1="170.0" y1="125" x2="286.25" y2="125" class="bar-baseline" />
  <rect x="286.25" y="114" width="116.25" height="22" rx="4" class="bar-orchestrator" />
  <text x="160" y="129" class="tier-label" text-anchor="end">Tier 2 — Standard</text>
  <text x="281.25" y="129" class="value-label" text-anchor="end">1.5K</text>
  <text x="407.50" y="129" class="value-label" text-anchor="start">3K</text>

  <!-- ==================== TIER 3 — Full Memory (3,000–5,500) ==================== -->
  <line x1="170.0" y1="180" x2="402.50" y2="180" class="bar-baseline" />
  <rect x="402.50" y="169" width="193.75" height="22" rx="4" class="bar-orchestrator" />
  <text x="160" y="184" class="tier-label" text-anchor="end">Tier 3 — Full Memory</text>
  <text x="397.50" y="184" class="value-label" text-anchor="end">3K</text>
  <text x="601.25" y="184" class="value-label" text-anchor="start">5.5K</text>

  <!-- ==================== TIER 4 — Multi-Agent (Orchestrator 2,000–4,000 / Specialist 1,500–2,500) ==================== -->
  <!-- Baseline -->
  <line x1="170.0" y1="235" x2="286.25" y2="235" class="bar-baseline" />
  <!-- Specialist sub-range: 1,500–2,500 (drawn first so orchestrator overlaps) -->
  <rect x="286.25" y="224" width="77.50" height="22" rx="4" class="bar-specialist" />
  <!-- Orchestrator main range: 2,000–4,000 -->
  <rect x="325.00" y="224" width="155.00" height="22" rx="4" class="bar-orchestrator" />
  <!-- Tier label -->
  <text x="160" y="239" class="tier-label" text-anchor="end">Tier 4 — Multi-Agent</text>
  <!-- Min / max value labels -->
  <text x="320.00" y="239" class="value-label" text-anchor="end">2K</text>
  <text x="485.00" y="239" class="value-label" text-anchor="start">4K</text>
  <!-- Specialist annotation below bar -->
  <text x="325.00" y="260" class="annot-label" text-anchor="middle">Specialists: 1.5K–2.5K</text>

  <!-- Source attribution -->
  <text x="690" y="318" class="source" text-anchor="end">Source: context-schemas.json [4]</text>
</svg>
